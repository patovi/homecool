<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeCool – Produkte</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .qr-modal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 1.25rem; }
    .qr-card { text-align: center; padding: 1rem; border: 1px solid var(--border); border-radius: 10px; }
    .qr-card .qr-name { font-weight: 600; font-size: .95rem; margin-top: .5rem; }
    .qr-card .qr-hint { font-size: .75rem; color: var(--text-muted); margin-top: .15rem; }

    .stock-controls { display: flex; align-items: center; gap: .35rem; }
    .stock-btn {
      width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border);
      background: #fff; font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; line-height: 1;
      transition: all .12s; font-weight: 700; color: var(--text);
    }
    .stock-btn:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
    .stock-val { min-width: 32px; text-align: center; font-weight: 600; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    requireAdmin();
    renderNav();

    let products = [];

    async function load() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <div class="page-header">
          <h1>Produkte</h1>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap">
            <button class="btn btn-outline" onclick="openQrModal()">📷 QR-Codes</button>
            <button class="btn btn-primary" onclick="openProductModal()">+ Neues Produkt</button>
          </div>
        </div>
        <div id="alert" class="alert alert-error hidden"></div>

        <div class="card">
          <div class="table-wrap"><table id="products-table"></table></div>
        </div>

        <!-- Produkt erstellen / bearbeiten -->
        <div class="modal-overlay hidden" id="product-modal">
          <div class="modal">
            <div class="modal-header">
              <span class="modal-title" id="product-modal-title">Produkt</span>
              <button class="modal-close" onclick="closeProductModal()">✕</button>
            </div>
            <div id="product-modal-alert" class="alert alert-error hidden"></div>
            <form id="product-form">
              <input type="hidden" id="edit-id">
              <div class="form-group">
                <label>Name</label>
                <input type="text" id="edit-name" required placeholder="z.B. Cola">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Verkaufspreis (€)</label>
                  <input type="number" id="edit-price" min="0.01" step="0.01" required placeholder="1.50">
                </div>
                <div class="form-group" id="initial-stock-group">
                  <label>Anfangsbestand</label>
                  <input type="number" id="edit-stock" min="0" value="0">
                </div>
              </div>
              <div class="form-group" id="active-group" style="display:none">
                <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer">
                  <input type="checkbox" id="edit-active" style="width:auto"> Aktiv
                </label>
              </div>
              <div style="display:flex;gap:.75rem;margin-top:.5rem">
                <button type="button" class="btn btn-outline" style="flex:1" onclick="closeProductModal()">Abbrechen</button>
                <button type="submit" class="btn btn-primary" style="flex:2">Speichern</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Bestand anpassen -->
        <div class="modal-overlay hidden" id="stock-modal">
          <div class="modal">
            <div class="modal-header">
              <span class="modal-title" id="stock-modal-title">Bestand anpassen</span>
              <button class="modal-close" onclick="closeStockModal()">✕</button>
            </div>
            <div id="stock-modal-alert" class="alert alert-error hidden"></div>

            <div style="text-align:center;padding:1rem 0 1.5rem">
              <div style="font-size:.85rem;color:var(--text-muted);margin-bottom:.35rem">Aktueller Bestand</div>
              <div id="stock-current" style="font-size:3rem;font-weight:800;color:var(--primary)"></div>
            </div>

            <div class="form-group">
              <label>Korrektur (positiv = hinzufügen, negativ = entnehmen)</label>
              <input type="number" id="stock-adjustment" placeholder="z.B. +12 oder -3" step="1">
            </div>
            <div id="stock-preview" style="text-align:center;font-size:.9rem;color:var(--text-muted);margin-bottom:1rem;min-height:1.5em"></div>

            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1.25rem">
              <button class="btn btn-outline btn-sm" onclick="setAdj(1)">+1</button>
              <button class="btn btn-outline btn-sm" onclick="setAdj(6)">+6</button>
              <button class="btn btn-outline btn-sm" onclick="setAdj(12)">+12</button>
              <button class="btn btn-outline btn-sm" onclick="setAdj(24)">+24</button>
              <button class="btn btn-outline btn-sm" onclick="setAdj(-1)">−1</button>
              <button class="btn btn-outline btn-sm" onclick="setAdj(-6)">−6</button>
              <button class="btn btn-outline btn-sm" onclick="setAdj(-12)">−12</button>
              <button class="btn btn-outline btn-sm" onclick="setAdj(-24)">−24</button>
            </div>

            <div style="display:flex;gap:.75rem">
              <button type="button" class="btn btn-outline" style="flex:1" onclick="closeStockModal()">Abbrechen</button>
              <button type="button" class="btn btn-primary" style="flex:2" onclick="saveStock()">✓ Speichern</button>
            </div>
          </div>
        </div>

        <!-- QR-Codes -->
        <div class="modal-overlay hidden" id="qr-modal">
          <div class="modal" style="max-width:680px">
            <div class="modal-header">
              <span class="modal-title">📷 Kiosk QR-Codes</span>
              <button class="modal-close" onclick="document.getElementById('qr-modal').classList.add('hidden')">✕</button>
            </div>
            <p style="color:var(--text-muted);font-size:.85rem;margin-bottom:1rem">
              Drucke diese QR-Codes aus und klebe sie auf die Produkte im Kühlschrank. Der Kiosk scannt sie automatisch.
            </p>
            <div class="qr-modal-grid" id="qr-grid"></div>
            <button class="btn btn-primary btn-block" style="margin-top:1rem" onclick="printQr()">🖨 Drucken</button>
          </div>
        </div>
      `;

      document.getElementById('product-form').addEventListener('submit', saveProduct);
      document.getElementById('stock-adjustment').addEventListener('input', updateStockPreview);
      await refresh();
    }

    async function refresh() {
      products = await api.products.list();
      document.getElementById('products-table').innerHTML = `
        <thead>
          <tr>
            <th>Produkt</th>
            <th>Preis</th>
            <th>Bestand</th>
            <th>Status</th>
            <th style="width:1px;white-space:nowrap">Aktionen</th>
          </tr>
        </thead>
        <tbody>
          ${products.map(p => `
            <tr>
              <td><span style="margin-right:.4rem">${productEmoji(p.name)}</span>${p.name}</td>
              <td>${fmt(p.price)}</td>
              <td>
                <div class="stock-controls">
                  <button class="stock-btn" onclick="quickAdj(${p.id}, -1)" title="−1">−</button>
                  <span class="stock-val">
                    <span class="badge ${p.stock > 5 ? 'badge-green' : p.stock > 0 ? 'badge-yellow' : 'badge-red'}">${p.stock}</span>
                  </span>
                  <button class="stock-btn" onclick="quickAdj(${p.id}, 1)" title="+1">+</button>
                  <button class="btn btn-outline btn-sm" onclick="openStockModal(${p.id})" title="Bestand anpassen">✏️</button>
                </div>
              </td>
              <td><span class="badge ${p.isActive ? 'badge-green' : 'badge-red'}">${p.isActive ? 'Aktiv' : 'Inaktiv'}</span></td>
              <td><button class="btn btn-outline btn-sm" onclick="openProductModal(${p.id})">Bearbeiten</button></td>
            </tr>`).join('')}
        </tbody>
      `;
    }

    // ─── PRODUCT MODAL ────────────────────────────────────────
    function openProductModal(id) {
      const p = id ? products.find(x => x.id === id) : null;
      document.getElementById('product-modal-title').textContent = p ? 'Produkt bearbeiten' : 'Neues Produkt';
      document.getElementById('edit-id').value = p?.id ?? '';
      document.getElementById('edit-name').value = p?.name ?? '';
      document.getElementById('edit-price').value = p?.price ?? '';
      document.getElementById('initial-stock-group').style.display = p ? 'none' : '';
      document.getElementById('edit-stock').value = '0';
      document.getElementById('active-group').style.display = p ? '' : 'none';
      if (p) document.getElementById('edit-active').checked = p.isActive;
      document.getElementById('product-modal').classList.remove('hidden');
    }

    function closeProductModal() {
      document.getElementById('product-modal').classList.add('hidden');
    }

    async function saveProduct(e) {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const alertEl = document.getElementById('product-modal-alert');
      try {
        if (id) {
          await api.products.update(parseInt(id), {
            name: document.getElementById('edit-name').value,
            price: parseFloat(document.getElementById('edit-price').value),
            isActive: document.getElementById('edit-active').checked
          });
        } else {
          await api.products.create({
            name: document.getElementById('edit-name').value,
            price: parseFloat(document.getElementById('edit-price').value),
            initialStock: parseInt(document.getElementById('edit-stock').value) || 0
          });
        }
        closeProductModal();
        await refresh();
      } catch (err) {
        showAlert(alertEl, err.message);
      }
    }

    // ─── STOCK MODAL ─────────────────────────────────────────
    let stockProductId = null;

    function openStockModal(id) {
      const p = products.find(x => x.id === id);
      if (!p) return;
      stockProductId = id;
      document.getElementById('stock-modal-title').textContent = `${productEmoji(p.name)} ${p.name} – Bestand`;
      document.getElementById('stock-current').textContent = p.stock;
      document.getElementById('stock-adjustment').value = '';
      document.getElementById('stock-preview').textContent = '';
      document.getElementById('stock-modal').classList.remove('hidden');
    }

    function closeStockModal() {
      document.getElementById('stock-modal').classList.add('hidden');
      stockProductId = null;
    }

    function setAdj(val) {
      document.getElementById('stock-adjustment').value = val;
      updateStockPreview();
    }

    function updateStockPreview() {
      const adj = parseInt(document.getElementById('stock-adjustment').value);
      const p = products.find(x => x.id === stockProductId);
      const preview = document.getElementById('stock-preview');
      if (!p || isNaN(adj)) { preview.textContent = ''; return; }
      const newStock = p.stock + adj;
      preview.innerHTML = `${p.stock} ${adj >= 0 ? '+' : ''}${adj} = <strong style="color:${newStock >= 0 ? 'var(--success)' : 'var(--danger)'}">${newStock}</strong>`;
    }

    async function saveStock() {
      const adj = parseInt(document.getElementById('stock-adjustment').value);
      const alertEl = document.getElementById('stock-modal-alert');
      if (isNaN(adj) || adj === 0) {
        showAlert(alertEl, 'Bitte eine Korrektur eingeben (z.B. +12 oder −3).');
        return;
      }
      try {
        await api.products.adjustStock(stockProductId, adj);
        closeStockModal();
        await refresh();
      } catch (err) {
        showAlert(alertEl, err.message);
      }
    }

    // Quick ±1 inline in table
    async function quickAdj(id, delta) {
      try {
        await api.products.adjustStock(id, delta);
        await refresh();
      } catch (err) {
        showAlert(document.getElementById('alert'), err.message);
      }
    }

    // ─── QR CODES ────────────────────────────────────────────
    function openQrModal() {
      const grid = document.getElementById('qr-grid');
      grid.innerHTML = '';

      const active = products.filter(p => p.isActive);
      if (active.length === 0) {
        grid.innerHTML = '<p style="color:var(--text-muted)">Keine aktiven Produkte.</p>';
        document.getElementById('qr-modal').classList.remove('hidden');
        return;
      }

      active.forEach(p => {
        // Build card with createElement only – no innerHTML +=
        const card = document.createElement('div');
        card.className = 'qr-card';

        const canvas = document.createElement('canvas');
        card.appendChild(canvas);

        const name = document.createElement('div');
        name.className = 'qr-name';
        name.textContent = `${productEmoji(p.name)} ${p.name}`;
        card.appendChild(name);

        const hint = document.createElement('div');
        hint.className = 'qr-hint';
        hint.textContent = `ID: ${p.id} · ${fmt(p.price)}`;
        card.appendChild(hint);

        grid.appendChild(card);

        // Render QR after the canvas is in the DOM
        QRCode.toCanvas(canvas, String(p.id), { width: 160, margin: 1, color: { dark: '#000', light: '#fff' } });
      });

      document.getElementById('qr-modal').classList.remove('hidden');
    }

    function printQr() {
      // Convert canvases to data-URLs before opening print window
      const cards = document.querySelectorAll('#qr-grid .qr-card');
      let html = '';
      cards.forEach(card => {
        const canvas = card.querySelector('canvas');
        const imgSrc = canvas ? canvas.toDataURL() : '';
        const name = card.querySelector('.qr-name')?.textContent ?? '';
        const hint = card.querySelector('.qr-hint')?.textContent ?? '';
        html += `<div class="qr-card">
          <img src="${imgSrc}" width="160" height="160" style="display:block;margin:0 auto">
          <div class="qr-name">${name}</div>
          <div class="qr-hint">${hint}</div>
        </div>`;
      });

      const win = window.open('', '_blank');
      win.document.write(`
        <html><head><title>QR-Codes – HomeCool</title>
        <style>
          body { font-family: sans-serif; padding: 1rem; }
          .qr-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
          .qr-card { text-align: center; padding: .75rem; border: 1px solid #ccc; border-radius: 8px; break-inside: avoid; }
          .qr-name { font-weight: 700; margin-top: .4rem; font-size: .9rem; }
          .qr-hint { font-size: .7rem; color: #888; }
        </style></head>
        <body onload="print()"><div class="qr-grid">${html}</div></body></html>`);
      win.document.close();
    }

    load();
  </script>
</body>
</html>
