<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeCool – Login</title>
  <link rel="icon" href="/homecool.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <h1>🧊 HomeCool</h1>
        <p>Kühlschrankverwaltung</p>
      </div>
      <div id="alert" class="alert alert-error hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" autocomplete="username" placeholder="Dein Name" required>
        </div>
        <div class="form-group">
          <label for="password">PIN / Passwort</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          Anmelden
        </button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (getToken()) window.location.href = '/dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const alert = document.getElementById('alert');
      btn.disabled = true;
      btn.textContent = 'Anmelden…';
      try {
        const res = await api.login(
          document.getElementById('name').value,
          document.getElementById('password').value
        );
        localStorage.setItem('hc_token', res.token);
        localStorage.setItem('hc_user', JSON.stringify({ id: res.userId, name: res.name, role: res.role }));
        window.location.href = '/dashboard.html';
      } catch (err) {
        showAlert(alert, err.message || 'Anmeldung fehlgeschlagen.', 'error');
        btn.disabled = false;
        btn.textContent = 'Anmelden';
      }
    });
  </script>
</body>
</html>
