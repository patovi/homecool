<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HomeCool – Verwaltung</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    requireAdmin();
    renderNav();

    let users = [];

    async function load() {
      const main = document.getElementById('main-content');
      main.innerHTML = `
        <div class="page-header"><h1>Benutzerverwaltung</h1>
          <button class="btn btn-primary" onclick="openCreate()">+ Neuer Benutzer</button>
        </div>
        <div id="alert" class="alert alert-error hidden"></div>

        <div class="card">
          <div class="table-wrap"><table id="users-table"></table></div>
        </div>

        <div class="modal-overlay hidden" id="modal">
          <div class="modal">
            <div class="modal-header">
              <span class="modal-title" id="modal-title">Benutzer</span>
              <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-alert" class="alert alert-error hidden"></div>
            <form id="modal-form">
              <input type="hidden" id="edit-id">
              <div class="form-group">
                <label>Name</label>
                <input type="text" id="edit-name" required placeholder="z.B. Lisa">
              </div>
              <div class="form-group">
                <label id="pw-label">PIN / Passwort</label>
                <input type="password" id="edit-pw" placeholder="••••">
              </div>
              <div class="form-group">
                <label>Rolle</label>
                <select id="edit-role">
                  <option value="User">Benutzer</option>
                  <option value="Admin">Admin</option>
                </select>
              </div>
              <div class="form-group" id="active-group" style="display:none">
                <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer">
                  <input type="checkbox" id="edit-active" style="width:auto"> Aktiv
                </label>
              </div>
              <div style="display:flex;gap:.75rem;margin-top:.5rem">
                <button type="button" class="btn btn-outline" style="flex:1" onclick="closeModal()">Abbrechen</button>
                <button type="submit" class="btn btn-primary" style="flex:2">Speichern</button>
              </div>
            </form>
          </div>
        </div>
      `;

      document.getElementById('modal-form').addEventListener('submit', save);
      await refresh();
    }

    async function refresh() {
      users = await api.users.list();
      document.getElementById('users-table').innerHTML = `
        <thead><tr><th>Name</th><th>Rolle</th><th>Status</th><th>Erstellt</th><th></th></tr></thead>
        <tbody>${users.map(u => `
          <tr>
            <td><strong>${u.name}</strong></td>
            <td><span class="badge ${u.role === 'Admin' ? 'badge-blue' : 'badge-green'}">${u.role}</span></td>
            <td><span class="badge ${u.isActive ? 'badge-green' : 'badge-red'}">${u.isActive ? 'Aktiv' : 'Inaktiv'}</span></td>
            <td>${fmtDate(u.createdAt)}</td>
            <td><button class="btn btn-outline btn-sm" onclick="openEdit(${u.id})">Bearbeiten</button></td>
          </tr>`).join('')}
        </tbody>
      `;
    }

    function openCreate() {
      document.getElementById('modal-title').textContent = 'Neuer Benutzer';
      document.getElementById('edit-id').value = '';
      document.getElementById('edit-name').value = '';
      document.getElementById('edit-pw').value = '';
      document.getElementById('edit-role').value = 'User';
      document.getElementById('pw-label').textContent = 'PIN / Passwort *';
      document.getElementById('edit-pw').required = true;
      document.getElementById('active-group').style.display = 'none';
      document.getElementById('modal').classList.remove('hidden');
    }

    function openEdit(id) {
      const u = users.find(x => x.id === id);
      document.getElementById('modal-title').textContent = 'Benutzer bearbeiten';
      document.getElementById('edit-id').value = u.id;
      document.getElementById('edit-name').value = u.name;
      document.getElementById('edit-pw').value = '';
      document.getElementById('edit-role').value = u.role;
      document.getElementById('pw-label').textContent = 'Neues Passwort (leer = unverändert)';
      document.getElementById('edit-pw').required = false;
      document.getElementById('active-group').style.display = '';
      document.getElementById('edit-active').checked = u.isActive;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    async function save(e) {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const alert = document.getElementById('modal-alert');
      const pw = document.getElementById('edit-pw').value;
      try {
        if (id) {
          const payload = {
            name: document.getElementById('edit-name').value,
            role: document.getElementById('edit-role').value,
            isActive: document.getElementById('edit-active').checked
          };
          if (pw) payload.password = pw;
          await api.users.update(parseInt(id), payload);
        } else {
          await api.users.create({
            name: document.getElementById('edit-name').value,
            password: pw,
            role: document.getElementById('edit-role').value
          });
        }
        closeModal();
        await refresh();
      } catch(err) {
        showAlert(alert, err.message);
      }
    }

    load();
  </script>
</body>
</html>
